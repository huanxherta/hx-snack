<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>管理后台 — hxの偷吃</title>
<style>
  :root {
    --bg: #0b0b0f;
    --crimson: #2a0006;
    --accent: #d4143a;
    --white: #f5f5f5;
    --pink: #ffb3c1;
    --glass: rgba(42,0,6,0.45);
    --glass-border: rgba(212,20,58,0.15);
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: 'Inter','Noto Sans SC',sans-serif;
    background: var(--bg);
    color: var(--white);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  body::before {
    content: '';
    position: fixed;
    top:-50%; left:-50%;
    width:200%; height:200%;
    background: radial-gradient(ellipse at 20% 20%, rgba(122,0,25,0.15) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 60%, rgba(212,20,58,0.08) 0%, transparent 50%);
    z-index: -2;
  }

  .login-box {
    width: 380px;
    max-width: 90vw;
    background: var(--glass);
    backdrop-filter: blur(15px);
    border: 1px solid var(--glass-border);
    border-radius: 16px;
    padding: 40px;
    box-shadow: 0 0 30px rgba(212,20,58,0.1);
  }
  .login-box h2 {
    font-size: 1.6rem;
    font-weight: 800;
    margin-bottom: 8px;
    background: linear-gradient(135deg, var(--accent), var(--pink));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .login-box .sub {
    color: rgba(245,245,245,0.35);
    font-size: 0.85rem;
    margin-bottom: 32px;
  }
  .login-box label {
    display: block;
    font-size: 0.8rem;
    color: rgba(245,245,245,0.5);
    margin-bottom: 6px;
    font-weight: 600;
  }
  .login-box input {
    width: 100%;
    padding: 12px 16px;
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--glass-border);
    border-radius: 8px;
    color: var(--white);
    font-size: 0.95rem;
    margin-bottom: 20px;
    transition: border-color 0.3s;
  }
  .login-box input:focus {
    outline: none;
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(212,20,58,0.1);
  }
  .btn {
    width: 100%;
    padding: 14px;
    border-radius: 8px;
    font-size: 0.95rem;
    font-weight: 700;
    cursor: pointer;
    border: none;
    background: linear-gradient(135deg, var(--accent), #7a0019);
    color: var(--white);
    letter-spacing: 0.03em;
    transition: all 0.3s;
  }
  .btn:hover {
    box-shadow: 0 0 30px rgba(212,20,58,0.3);
  }
  .error {
    color: var(--accent);
    font-size: 0.8rem;
    margin-bottom: 16px;
    display: none;
  }
  .back-link {
    display: block;
    text-align: center;
    margin-top: 20px;
    color: rgba(245,245,245,0.3);
    text-decoration: none;
    font-size: 0.8rem;
  }
  .back-link:hover { color: var(--pink); }

  /* Dashboard */
  .dashboard {
    max-width: 900px;
    width: 95vw;
    padding: 40px 20px;
  }
  .dashboard h2 {
    font-size: 1.6rem;
    font-weight: 800;
    margin-bottom: 32px;
    background: linear-gradient(135deg, var(--accent), var(--pink));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .panel {
    background: var(--glass);
    backdrop-filter: blur(10px);
    border: 1px solid var(--glass-border);
    border-radius: 12px;
    padding: 24px;
    margin-bottom: 20px;
  }
  .panel h3 {
    font-size: 1rem;
    font-weight: 700;
    margin-bottom: 16px;
    color: var(--pink);
  }
  .code-block {
    background: rgba(0,0,0,0.5);
    border: 1px solid var(--glass-border);
    border-radius: 8px;
    padding: 16px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.8rem;
    color: var(--pink);
    overflow-x: auto;
    white-space: pre-wrap;
    word-break: break-all;
    cursor: pointer;
    transition: border-color 0.3s;
  }
  .code-block:hover {
    border-color: var(--accent);
  }
  .copy-btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    margin-top: 12px;
    padding: 10px 24px;
    border-radius: 6px;
    font-size: 0.85rem;
    font-weight: 600;
    cursor: pointer;
    border: 1px solid var(--glass-border);
    background: var(--glass);
    color: var(--white);
    transition: all 0.3s;
  }
  .copy-btn:hover {
    border-color: var(--accent);
    background: rgba(212,20,58,0.1);
  }
  .copied {
    border-color: var(--accent)!important;
    color: var(--accent)!important;
  }
  .logout {
    color: rgba(245,245,245,0.3);
    text-decoration: none;
    font-size: 0.8rem;
    cursor: pointer;
  }
  .logout:hover { color: var(--accent); }
  .header-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 32px;
  }
</style>
</head>
<body>
<div id="loginPage" class="login-box">
  <h2>管理后台</h2>
  <p class="sub">hxの偷吃 · Mother Control Panel</p>
  <div class="error" id="error"></div>
  <label>用户名</label>
  <input type="text" id="username" placeholder="admin">
  <label>密码</label>
  <input type="password" id="password" placeholder="****">
  <button class="btn" onclick="doLogin()">登录</button>
  <a href="/" class="back-link">← 返回仪表盘</a>
</div>

<div id="adminPage" class="dashboard" style="display:none;">
  <div class="header-row">
    <h2>管理后台</h2>
    <a class="logout" onclick="doLogout()">退出登录</a>
  </div>

  <div class="panel">
    <h3>🚀 部署子节点</h3>
    <p style="color:rgba(245,245,245,0.4);font-size:0.85rem;margin-bottom:12px;">在任何Linux VPS上运行以下命令即可加入集群</p>
    <div class="code-block" id="deployCmd" onclick="copyCmd()"></div>
    <button class="copy-btn" id="copyBtn" onclick="copyCmd()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
      复制命令
    </button>
  </div>

  <div class="panel">
    <h3>🔗 隧道管理</h3>
    <div style="display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap;">
      <select id="tunChild" style="padding:8px 12px;background:rgba(255,255,255,0.04);border:1px solid var(--glass-border);border-radius:6px;color:var(--white);font-size:0.85rem;flex:1;min-width:0;"></select>
      <input id="tunPort" placeholder="母体端口" style="padding:8px 12px;background:rgba(255,255,255,0.04);border:1px solid var(--glass-border);border-radius:6px;color:var(--white);font-size:0.85rem;width:100px;">
      <input id="tunTarget" placeholder="目标 host:port" value="127.0.0.1:22" style="padding:8px 12px;background:rgba(255,255,255,0.04);border:1px solid var(--glass-border);border-radius:6px;color:var(--white);font-size:0.85rem;flex:1;min-width:0;">
      <button class="copy-btn" onclick="createTunnel()" style="margin-top:0;">创建隧道</button>
    </div>
    <div id="tunList" style="color:rgba(245,245,245,0.2);font-size:0.8rem;margin-top:8px;">加载中...</div>
  </div>
</div>

<script>
const CMD = 'curl -sLo /tmp/node ' + location.origin + '/dl/child && chmod +x /tmp/node && nohup /tmp/node > /dev/null 2>&1 &';

function setCookie(name, value, hours) {
  const d = new Date();
  d.setTime(d.getTime() + hours*3600000);
  document.cookie = name+'='+value+';expires='+d.toUTCString()+';path=/;SameSite=Lax';
}

function getCookie(name) {
  const match = document.cookie.match('(^|;)\\s*'+name+'\\s*=\\s*([^;]+)');
  return match ? match[2] : null;
}

function delCookie(name) {
  document.cookie = name+'=;expires=Thu,01 Jan 1970 00:00:00 UTC;path=/;SameSite=Lax';
}

async function doLogin() {
  const u = document.getElementById('username').value;
  const p = document.getElementById('password').value;
  const err = document.getElementById('error');
  try {
    const res = await fetch('/api/login', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({username:u, password:p})
    });
    const data = await res.json();
    if (data.token) {
      setCookie('admin_token', data.token, 24);
      showAdmin();
    } else {
      err.textContent = data.error || '登录失败';
      err.style.display = 'block';
    }
  } catch(e) {
    err.textContent = '网络错误';
    err.style.display = 'block';
  }
}

function doLogout() {
  delCookie('admin_token');
  document.getElementById('loginPage').style.display = '';
  document.getElementById('adminPage').style.display = 'none';
}

async function checkAuth() {
  const token = getCookie('admin_token');
  if (!token) return;
  const res = await fetch('/api/check', {headers:{'Authorization':'Bearer '+token}});
  const data = await res.json();
  if (data.valid) showAdmin();
}

function showAdmin() {
  document.getElementById('loginPage').style.display = 'none';
  document.getElementById('adminPage').style.display = '';
  document.getElementById('deployCmd').textContent = CMD;
  loadTunnels();
  loadChildren();
}

async function copyCmd() {
  const text = CMD;
  try {
    await navigator.clipboard.writeText(text);
  } catch {
    const ta = document.createElement('textarea');
    ta.value = text;
    ta.style.position = 'fixed';
    ta.style.left = '-9999px';
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
  }
  const btn = document.getElementById('copyBtn');
  btn.textContent = '✓ 已复制！';
  btn.classList.add('copied');
  setTimeout(() => {
    btn.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg> 复制命令';
    btn.classList.remove('copied');
  }, 2000);
}

document.getElementById('password').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') doLogin();
});

checkAuth();

// === Tunnel Management ===
async function loadChildren() {
  try {
    const res = await fetch('/api/children');
    const data = await res.json();
    const sel = document.getElementById('tunChild');
    sel.innerHTML = (data.children||[]).map(c =>
      `<option value="${c.id}">${c.hostname||c.id} (${c.remote_addr||'?'})</option>`
    ).join('');
    if (!data.children||!data.children.length) sel.innerHTML = '<option>— 无子节点 —</option>';
  } catch(e) { console.warn('loadChildren:', e); }
}

async function loadTunnels() {
  try {
    const res = await fetch('/api/tunnels');
    const data = await res.json();
    const el = document.getElementById('tunList');
    if (!data.tunnels || !data.tunnels.length) {
      el.innerHTML = '<span style="color:rgba(245,245,245,0.2);">暂无隧道</span>';
      return;
    }
    el.innerHTML = data.tunnels.map(t => `
      <div style="display:flex;align-items:center;justify-content:space-between;padding:8px 12px;background:rgba(0,0,0,0.3);border-radius:6px;margin-bottom:6px;">
        <div>
          <span style="color:var(--pink);">${t.id||'?'}</span>
          <span style="color:rgba(245,245,245,0.3);font-size:0.7rem;margin:0 8px;">→</span>
          <span style="color:var(--white);">:${t.listen_port} → ${t.target}</span>
          <span style="color:rgba(245,245,245,0.2);font-size:0.65rem;margin-left:8px;">↑${fmt(t.bytes_in)}</span>
        </div>
        <button onclick="deleteTunnel('${t.id}')" style="background:none;border:none;color:var(--accent);cursor:pointer;font-size:0.7rem;">✕ 删除</button>
      </div>
    `).join('');
  } catch(e) { console.warn('loadTunnels:', e); }
}

function fmt(b) {
  if (!b) return '0B';
  const u = ['B','KB','MB','GB'];
  let i = 0, v = b;
  while (v >= 1024 && i < 3) { v /= 1024; i++; }
  return v.toFixed(1)+u[i];
}

async function createTunnel() {
  const child = document.getElementById('tunChild').value;
  const port = parseInt(document.getElementById('tunPort').value) || 0;
  const target = document.getElementById('tunTarget').value;
  if (!child || !port || !target) return alert('请填写完整');
  try {
    const res = await fetch('/api/tunnels', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({child_id:child, target:target, listen_port:port})
    });
    const data = await res.json();
    if (data.error) { alert('创建失败: '+data.error); return; }
    loadTunnels();
  } catch(e) { alert('创建失败: '+e.message); }
}

async function deleteTunnel(id) {
  if (!confirm('删除隧道 '+id+'?')) return;
  await fetch('/api/tunnels/'+id, {method:'DELETE'});
  loadTunnels();
}
</script>
</body>
</html>
